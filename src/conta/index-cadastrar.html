<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta ByteNews</title>
    <link rel="stylesheet" href="../CSS/style-conta.css">
    <link rel="icon" type="image/png" href="../icones/logo.png">
</head>
<body>
    <main>
        <div class="box">
            <div class="banner">
                <img src="../icones/logo.png">
                <p>Crie sua conta e fique por dentro das últimas notícias sobre tecnologia, inovação e o mundo digital.</p>
            </div>
            <form class="form">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="informe seu nome completo">
                <label for="e-mail">Informe seu e-mail:</label>
                <input type="text" id="e-mail" name="e-mail" placeholder="ex:@gmail">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="informe a senha">
                <label for="senha">Confirmar senha</label>
                <input type="password" id="confirme-senha" name="confirme-senha" placeholder="confirme a senha">
                <button> <a href="../index.html">Cadastrar </a></button>
                <p class="login">Ja tem uma conta?<a href="../conta/index-login.html">Entrar</a></p>
            </form>
        </div>
    </main>
</body>
</html>
