<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta ByteNews</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/png" href="/src/assets/icons/icone.png">
<body>
<form id="formUsuario">
    <img src="/src/assets/icons/logo-padrao.png" alt="Logo ByteNews">
    <div class="container">
        <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" placeholder="informe seu nome completo">
        <label for="e-mail">Informe seu e-mail:</label>
        <input type="text" id="e-mail" name="e-mail" placeholder="ex:@gmail">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="informe a senha">
        <label for="senha">Confirmar senha</label>
        <input type="password" id="confirme-senha" name="confirme-senha" placeholder="confirme a senha">
        <div class="botoes">
            <button formaction="/index.html" formtarget="_self">Cadastrar</button>
        </div>
        <p class="login">Ja tem uma conta?<a href="./index-login.html">Entrar</a></p>
    </div>
</form>
<script src="./script/script.js"></script>
</body>
</html>
